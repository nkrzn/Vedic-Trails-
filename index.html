<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="refresh" content="0; url=vedic-trails-homepage-v20.html" />
<title>Vedic Trails</title>
<style>
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.5s var(--ease);
    background: rgba(247, 241, 229, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    text-decoration: none;
    color: var(--navy);
  }
  .nav-logo-mark {
    width: 32px;
    height: 32px;
  }
  .nav-logo-text {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.45rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--navy);
  }
  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
    align-items: center;
  }
  .nav-links a {
    font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--navy);
    text-decoration: none;
    transition: color 0.3s var(--ease);
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--gold);
    transition: width 0.3s var(--ease);
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta {
    background: var(--navy);
    color: var(--cream);
    padding: 0.7rem 1.5rem;
    border: none;
    border-radius: 999px;
    font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.3s var(--ease);
    text-decoration: none;
  }
  .nav-cta:hover {
    background: var(--gold);
    transform: translateY(-1px);
  }
    nav { padding: 1.2rem 1.2rem; }
    .nav-links { display: none; }
    .nav-cta { display: none; }
</style>
</head>
<body style="padding-top:80px">
<script>window.location.replace('vedic-trails-homepage-v20.html');</script>
</body>
</html>
